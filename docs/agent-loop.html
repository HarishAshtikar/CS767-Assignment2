<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2d35' : '#f0ede8',
    primaryTextColor: dark ? '#c2c0b6' : '#1a1a1a',
    primaryBorderColor: dark ? '#444' : '#ccc',
    edgeLabelBackground: dark ? '#1e2026' : '#ffffff',
  },
});
const { svg } = await mermaid.render('agent-loop', `flowchart TD
    A([POST /api/analyze]) --> B[Load CSV\\nBuild data context]
    B --> C{Gemini available?}
    C -- yes --> D[Send context + goal\\nto Gemini]
    C -- no --> FB

    D --> E[Gemini returns\\nPython code snippet]
    E --> F[executor.py\\nRun in sandbox]
    F --> G{Execution\\nresult}
    G -- success --> H[Append output\\nto conversation]
    G -- error --> I[Append traceback\\nto conversation]
    H --> J{Gemini signals\\ndone?}
    I --> J
    J -- no --> K{Iteration\\n< MAX?}
    K -- yes --> D
    K -- no --> L[Force finish]
    J -- yes --> L
    L --> M[Write report.json\\nreport.md + PNGs]

    D -- GeminiQuotaError --> FB[run_local_analysis]
    FB --> FB1[pandas stats\\n+ describe]
    FB1 --> FB2[Generate local charts\\ndistributions · correlations]
    FB2 --> M

    M --> N([Return results to UI])
`);
document.getElementById('erd').innerHTML = svg;
</script>
