<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataSense</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #111312;
    --panel: #191d1b;
    --panel-2: #202522;
    --line: #303730;
    --line-strong: #465144;
    --text: #f3f0e8;
    --muted: #a8aaa0;
    --quiet: #74786d;
    --accent: #c7ef6a;
    --accent-dark: #202a15;
    --danger: #ff7a76;
    --blue: #8dc9ff;
    --shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background: var(--bg);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
  }
  button, textarea { font: inherit; }
  button { cursor: pointer; }
  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
  }
  aside {
    border-right: 1px solid var(--line);
    background: rgba(25, 29, 27, 0.88);
    padding: 24px;
  }
  main {
    padding: 26px;
    min-width: 0;
  }
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 0;
    font-weight: 650;
  }
  .pill {
    border: 1px solid rgba(199,239,106,0.28);
    color: var(--accent);
    background: rgba(199,239,106,0.08);
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 12px;
  }
  .section-label {
    margin: 22px 0 10px;
    color: var(--quiet);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .dataset-list {
    display: grid;
    gap: 8px;
  }
  .dataset-btn {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 8px;
    padding: 12px;
    text-align: left;
  }
  .dataset-btn:hover, .dataset-btn.active {
    border-color: var(--accent);
    background: var(--accent-dark);
  }
  .dataset-name {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 650;
  }
  .dataset-size {
    display: block;
    margin-top: 2px;
    color: var(--quiet);
    font-size: 12px;
  }
  .empty {
    border: 1px dashed var(--line-strong);
    border-radius: 8px;
    padding: 16px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .title-block h2 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 0;
  }
  .title-block p {
    margin: 5px 0 0;
    color: var(--muted);
  }
  .refresh-btn, .run-btn, .secondary-btn {
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    color: var(--text);
    background: var(--panel-2);
    padding: 10px 14px;
  }
  .refresh-btn:hover, .secondary-btn:hover {
    border-color: var(--accent);
  }
  .run-btn {
    border-color: transparent;
    background: var(--accent);
    color: #111312;
    font-weight: 750;
  }
  .run-btn:disabled {
    opacity: 0.42;
    cursor: not-allowed;
  }
  .workspace {
    display: grid;
    gap: 22px;
    margin-top: 22px;
  }
  .band {
    border: 1px solid var(--line);
    background: rgba(25, 29, 27, 0.9);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }
  .band-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .band-title {
    margin: 0;
    font-size: 15px;
    font-weight: 750;
  }
  .band-body {
    padding: 18px;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .option-btn {
    min-height: 154px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 8px;
    padding: 14px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn:hover, .option-btn.active {
    border-color: var(--accent);
    background: var(--accent-dark);
  }
  .option-title {
    font-weight: 750;
    color: var(--accent);
  }
  .option-goal {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }
  textarea {
    width: 100%;
    min-height: 104px;
    resize: vertical;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 13px;
    outline: none;
  }
  textarea:focus {
    border-color: var(--accent);
  }
  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 14px;
  }
  .path-text {
    color: var(--quiet);
    font-size: 13px;
  }
  .status {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--muted);
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--line-strong);
    border-top-color: var(--accent);
    border-radius: 999px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    display: none;
    border: 1px solid rgba(255,122,118,0.35);
    color: var(--danger);
    background: rgba(255,122,118,0.08);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .results {
    display: none;
  }
  .findings {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .finding {
    border: 1px solid var(--line);
    background: var(--panel-2);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .finding small {
    display: block;
    margin-bottom: 8px;
    color: var(--accent);
    font-weight: 750;
  }
  .charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
  }
  .chart {
    border: 1px solid var(--line);
    background: #f7f7f4;
    border-radius: 8px;
    overflow: hidden;
  }
  .chart img {
    display: block;
    width: 100%;
    cursor: zoom-in;
  }
  .summary {
    color: var(--text);
    line-height: 1.7;
  }
  .summary h1,
  .summary h2,
  .summary h3 {
    margin: 18px 0 8px;
    line-height: 1.25;
  }
  .summary h1 { font-size: 24px; }
  .summary h2 { font-size: 20px; color: var(--accent); }
  .summary h3 { font-size: 17px; }
  .summary p {
    margin: 0 0 12px;
  }
  .summary ul,
  .summary ol {
    margin: 0 0 14px 22px;
  }
  .summary li {
    margin: 5px 0;
  }
  .summary strong {
    color: var(--text);
  }
  .summary code {
    padding: 2px 5px;
    border-radius: 5px;
    color: var(--accent);
    background: rgba(199,239,106,0.08);
  }
  .summary blockquote {
    margin: 12px 0;
    padding: 8px 12px;
    border-left: 3px solid var(--accent);
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }
  .zoom-overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background: rgba(0,0,0,0.84);
  }
  .zoom-overlay.open {
    display: flex;
  }
  .zoom-overlay img {
    max-width: min(96vw, 1400px);
    max-height: 92vh;
    object-fit: contain;
    background: #f7f7f4;
    border-radius: 8px;
    box-shadow: var(--shadow);
    cursor: zoom-out;
  }
  .zoom-close {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 42px;
    height: 42px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    color: var(--text);
    background: rgba(25,29,27,0.9);
    font-size: 24px;
    line-height: 1;
  }
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    aside { border-right: 0; border-bottom: 1px solid var(--line); }
    .options, .findings { grid-template-columns: 1fr; }
    .topbar { align-items: flex-start; flex-direction: column; }
  }
</style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="brand">
      <h1>DataSense</h1>
      <span class="pill">Gemini</span>
    </div>

    <button class="refresh-btn" id="refreshBtn">Refresh Datasets</button>

    <div class="section-label">Input Datasets</div>
    <div class="dataset-list" id="datasetList"></div>
  </aside>

  <main>
    <div class="topbar">
      <div class="title-block">
        <h2 id="activeDataset">Select a dataset</h2>
        <p id="activeMeta">Place CSV files in the input folder, then choose one here.</p>
      </div>
      <div class="status" id="status">
        <span class="spinner"></span>
        <span id="statusText">Working</span>
      </div>
    </div>

    <div class="workspace">
      <div class="error" id="errorBox"></div>

      <section class="band">
        <div class="band-header">
          <h3 class="band-title">Suggested Analyses</h3>
          <span class="path-text" id="inputPath">input/</span>
        </div>
        <div class="band-body">
          <div class="options" id="options"></div>
        </div>
      </section>

      <section class="band">
        <div class="band-header">
          <h3 class="band-title">Selected Analysis</h3>
          <span class="path-text" id="outputPath">output/</span>
        </div>
        <div class="band-body">
          <textarea id="goalInput" placeholder="Choose one of the suggested analyses or write your own goal."></textarea>
          <div class="action-row">
            <span class="path-text" id="selectedHint">No dataset selected.</span>
            <button class="run-btn" id="runBtn" disabled>Run Analysis</button>
          </div>
        </div>
      </section>

      <section class="results" id="results">
        <section class="band">
          <div class="band-header">
            <h3 class="band-title">Key Findings</h3>
            <span class="path-text" id="iterationText"></span>
          </div>
          <div class="band-body">
            <div class="findings" id="findings"></div>
          </div>
        </section>

        <section class="band" style="margin-top:22px;">
          <div class="band-header">
            <h3 class="band-title">Plots</h3>
            <span class="path-text" id="plotPath"></span>
          </div>
          <div class="band-body">
            <div class="charts" id="charts"></div>
          </div>
        </section>

        <section class="band" style="margin-top:22px;">
          <div class="band-header">
            <h3 class="band-title">Report</h3>
            <span class="path-text" id="reportPath"></span>
          </div>
          <div class="band-body">
            <div class="summary" id="summary"></div>
          </div>
        </section>
      </section>
    </div>
  </main>
</div>

<div class="zoom-overlay" id="zoomOverlay" aria-hidden="true">
  <button class="zoom-close" id="zoomClose" aria-label="Close zoomed image">&times;</button>
  <img id="zoomImage" alt="Zoomed analysis plot">
</div>

<script>
const datasetList = document.getElementById('datasetList');
const optionsEl = document.getElementById('options');
const goalInput = document.getElementById('goalInput');
const runBtn = document.getElementById('runBtn');
const errorBox = document.getElementById('errorBox');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const resultsEl = document.getElementById('results');
const zoomOverlay = document.getElementById('zoomOverlay');
const zoomImage = document.getElementById('zoomImage');

let datasets = [];
let selectedDataset = null;
let selectedOptionIndex = null;

document.getElementById('refreshBtn').addEventListener('click', loadDatasets);
runBtn.addEventListener('click', runAnalysis);
goalInput.addEventListener('input', updateRunState);

function setStatus(text, visible = true) {
  statusText.textContent = text;
  statusEl.style.display = visible ? 'flex' : 'none';
}

function showError(message) {
  errorBox.textContent = message;
  errorBox.style.display = 'block';
}

function clearError() {
  errorBox.style.display = 'none';
  errorBox.textContent = '';
}

async function loadDatasets() {
  clearError();
  setStatus('Loading datasets');
  try {
    const res = await fetch('/api/datasets');
    if (!res.ok) throw new Error('Could not load datasets.');
    const data = await res.json();
    datasets = data.datasets || [];
    renderDatasets();
    if (datasets.length && !selectedDataset) selectDataset(datasets[0].id);
  } catch (err) {
    showError(err.message);
  } finally {
    setStatus('', false);
  }
}

function renderDatasets() {
  datasetList.innerHTML = '';
  if (!datasets.length) {
    datasetList.innerHTML = '<div class="empty">No CSV files found in input/. Add a dataset and refresh.</div>';
    return;
  }
  datasets.forEach(dataset => {
    const btn = document.createElement('button');
    btn.className = `dataset-btn ${selectedDataset === dataset.id ? 'active' : ''}`;
    btn.innerHTML = `
      <span class="dataset-name">${escapeHtml(dataset.name)}</span>
      <span class="dataset-size">${formatBytes(dataset.size_bytes)}</span>
    `;
    btn.addEventListener('click', () => selectDataset(dataset.id));
    datasetList.appendChild(btn);
  });
}

async function selectDataset(datasetId) {
  selectedDataset = datasetId;
  selectedOptionIndex = null;
  goalInput.value = '';
  resultsEl.style.display = 'none';
  clearError();
  renderDatasets();

  const dataset = datasets.find(item => item.id === datasetId);
  document.getElementById('activeDataset').textContent = dataset ? dataset.name : datasetId;
  document.getElementById('activeMeta').textContent = dataset ? `${formatBytes(dataset.size_bytes)} in input/` : 'Dataset selected.';
  document.getElementById('selectedHint').textContent = 'Choose an analysis option.';
  document.getElementById('outputPath').textContent = dataset ? `output/${dataset.stem}/` : 'output/';
  document.getElementById('inputPath').textContent = `input/${datasetId}`;

  const cachedOptions = dataset && dataset.options ? dataset.options : [];
  if (cachedOptions.length) {
    renderOptions(cachedOptions);
    setStatus('', false);
    updateRunState();
    return;
  }

  setStatus('Building suggestions');
  optionsEl.innerHTML = '';
  try {
    const res = await fetch(`/api/datasets/${encodeURIComponent(datasetId)}/suggestions`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Could not build suggestions.');
    }
    const data = await res.json();
    renderOptions(data.options || []);
  } catch (err) {
    showError(err.message);
  } finally {
    setStatus('', false);
    updateRunState();
  }
}

function renderOptions(options) {
  optionsEl.innerHTML = '';
  if (!options.length) {
    optionsEl.innerHTML = '<div class="empty">No analysis suggestions could be generated for this dataset.</div>';
    return;
  }
  options.forEach((option, index) => {
    const btn = document.createElement('button');
    btn.className = `option-btn ${selectedOptionIndex === index ? 'active' : ''}`;
    btn.innerHTML = `
      <span class="option-title">${escapeHtml(option.title)}</span>
      <span class="option-goal">${escapeHtml(option.goal)}</span>
    `;
    btn.addEventListener('click', () => {
      selectedOptionIndex = index;
      goalInput.value = option.goal;
      document.querySelectorAll('.option-btn').forEach(item => item.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('selectedHint').textContent = option.title;
      updateRunState();
    });
    optionsEl.appendChild(btn);
  });
}

function updateRunState() {
  runBtn.disabled = !(selectedDataset && goalInput.value.trim());
}

async function runAnalysis() {
  clearError();
  resultsEl.style.display = 'none';
  runBtn.disabled = true;
  setStatus('Running analysis');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        dataset: selectedDataset,
        goal: goalInput.value.trim(),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Analysis failed.');
    renderResults(data);
  } catch (err) {
    showError(err.message);
  } finally {
    setStatus('', false);
    updateRunState();
  }
}

function renderResults(data) {
  resultsEl.style.display = 'block';
  document.getElementById('iterationText').textContent = `${data.iterations || 0} iterations`;
  document.getElementById('plotPath').textContent = `${data.output_folder}/`;
  document.getElementById('reportPath').textContent = `${data.output_folder}/report.md`;

  const findings = document.getElementById('findings');
  findings.innerHTML = '';
  (data.key_findings || []).forEach((finding, index) => {
    const div = document.createElement('div');
    div.className = 'finding';
    div.innerHTML = `<small>Finding ${index + 1}</small>${escapeHtml(finding)}`;
    findings.appendChild(div);
  });
  if (!findings.children.length) {
    findings.innerHTML = '<div class="empty">No key findings returned.</div>';
  }

  const charts = document.getElementById('charts');
  charts.innerHTML = '';
  (data.charts || []).forEach(url => {
    const div = document.createElement('div');
    div.className = 'chart';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Analysis plot';
    img.addEventListener('click', () => openZoom(url));
    div.appendChild(img);
    charts.appendChild(div);
  });
  if (!charts.children.length) {
    charts.innerHTML = '<div class="empty">No plots were generated.</div>';
  }

  document.getElementById('summary').innerHTML = renderMarkdown(data.summary || '');
}

function openZoom(url) {
  zoomImage.src = url;
  zoomOverlay.classList.add('open');
  zoomOverlay.setAttribute('aria-hidden', 'false');
}

function closeZoom() {
  zoomOverlay.classList.remove('open');
  zoomOverlay.setAttribute('aria-hidden', 'true');
  zoomImage.src = '';
}

document.getElementById('zoomClose').addEventListener('click', closeZoom);
zoomOverlay.addEventListener('click', event => {
  if (event.target === zoomOverlay || event.target === zoomImage) closeZoom();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeZoom();
});

function renderMarkdown(markdown) {
  const lines = String(markdown).replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let listType = null;

  function closeList() {
    if (listType) {
      html += `</${listType}>`;
      listType = null;
    }
  }

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) {
      closeList();
      continue;
    }

    if (line.startsWith('### ')) {
      closeList();
      html += `<h3>${inlineMarkdown(line.slice(4))}</h3>`;
    } else if (line.startsWith('## ')) {
      closeList();
      html += `<h2>${inlineMarkdown(line.slice(3))}</h2>`;
    } else if (line.startsWith('# ')) {
      closeList();
      html += `<h1>${inlineMarkdown(line.slice(2))}</h1>`;
    } else if (/^[-*]\s+/.test(line)) {
      if (listType !== 'ul') {
        closeList();
        html += '<ul>';
        listType = 'ul';
      }
      html += `<li>${inlineMarkdown(line.replace(/^[-*]\s+/, ''))}</li>`;
    } else if (/^\d+\.\s+/.test(line)) {
      if (listType !== 'ol') {
        closeList();
        html += '<ol>';
        listType = 'ol';
      }
      html += `<li>${inlineMarkdown(line.replace(/^\d+\.\s+/, ''))}</li>`;
    } else if (line.startsWith('> ')) {
      closeList();
      html += `<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`;
    } else {
      closeList();
      html += `<p>${inlineMarkdown(line)}</p>`;
    }
  }

  closeList();
  return html;
}

function inlineMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  return `${(bytes / Math.pow(1024, index)).toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

loadDatasets();
</script>
</body>
</html>
